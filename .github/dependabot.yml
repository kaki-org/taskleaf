version: 2
updates:
  - package-ecosystem: "bundler"
    directory: "/"
    schedule:
      interval: "weekly"
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    ignore:
      # net-imap の major を除外
      - dependency-name: "net-imap"
        update-types: ["version-update:semver-major"]
